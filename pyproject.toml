# pyproject.toml

# Конфигурация для isort (сортировщик импортов)
[tool.isort]
# Используем профиль "pep8", который автоматически настраивает
# группировку импортов и длину строки согласно PEP 8.
profile = "black"

# Конфигурация для black (форматтер кода)
[tool.black]
# Главное изменение: устанавливаем длину строки в 79 символов.
line-length = 88
target-version = ['py312'] # Укажите вашу версию Python

# Опционально: если вы предпочитаете одинарные кавычки, раскомментируйте строку ниже.
# PEP 8 не имеет строгого правила, но требует консистентности.
# Black по умолчанию использует двойные.
# skip-string-normalization = true

# Конфигурация для pydocstyle (проверка докстрингов)
[tool.pydocstyle]
convention = "google"
add-ignore = ["D100", "D104", "D107"]
# PEP 8 рекомендует ограничивать докстринги и комментарии 72 символами.
# flake8 с плагином проверит это автоматически, если включить правило `doc-length-errors`.

# Конфигурация для flake8 (линтер)
[tool.flake8]
exclude = [
    ".git",
    "__pycache__",
    "docs/build",
    "build",
    "dist",
    ".venv",
    "venv",
    ".venv_linux",
    ".pyc",
    ".env"
]

# Устанавливаем максимальную длину строки в 79 символов, чтобы соответствовать black.
max-line-length = 88

# Также проверяем длину докстрингов (рекомендация PEP 8 - 72 символа)
max-doc-length = 80

# Игнорируем ошибки, которые конфликтуют с black.
ignore = ["E203", "W503"]

# Максимальная сложность кода (по умолчанию 10)
max-complexity = 10